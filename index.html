<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000008" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Survivor" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap"
    />
    <title>Survivor Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000008;
      }
      /* Fixed body: stops iOS Safari rubber-band scrolling and pull-to-refresh. */
      body {
        position: fixed;
        inset: 0;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      /* The game fills the safe area via fixed insets (NOT padding — Phaser
         measures the container's border box, so padding would let the canvas
         extend under the notch / home indicator). */
      #game-container {
        position: fixed;
        top: env(safe-area-inset-top, 0px);
        right: env(safe-area-inset-right, 0px);
        bottom: env(safe-area-inset-bottom, 0px);
        left: env(safe-area-inset-left, 0px);
      }
      canvas {
        display: block;
        touch-action: none;
      }

      /* Boot loader — first paint while fonts/JS/Phaser load. */
      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: #000008;
        opacity: 1;
        transition: opacity 320ms ease-out;
      }
      #boot-loader.boot-loader-hidden {
        opacity: 0;
        visibility: hidden;
      }
      #boot-loader .boot-wordmark {
        font-family: "Rajdhani", "Atkinson Hyperlegible", Arial, sans-serif;
        font-weight: 700;
        font-size: clamp(20px, 4vw, 34px);
        letter-spacing: 6px;
        color: #ffd94a;
      }
      #boot-loader .boot-track {
        position: relative;
        width: 140px;
        height: 2px;
        background: rgba(102, 187, 255, 0.18);
        overflow: hidden;
      }
      #boot-loader .boot-track::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 40px;
        height: 2px;
        background: #66bbff;
        animation: boot-sweep 1.1s ease-in-out infinite alternate;
      }
      @keyframes boot-sweep {
        from { transform: translateX(0); }
        to { transform: translateX(100px); }
      }
      @keyframes boot-pulse {
        from { opacity: 0.4; }
        to { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-loader .boot-track::after {
          transform: translateX(50px);
          animation: boot-pulse 1.6s ease-in-out infinite alternate;
        }
      }

      /* Crash recovery overlay — a game frame frozen by an uncaught
         exception stops rendering entirely (Phaser only reschedules its
         next requestAnimationFrame after a step completes without
         throwing), so this is the only way the player finds out something
         went wrong instead of staring at a dead frame. Top of the stack —
         above the rotate overlay (100) and boot loader (50) — since a
         crash can happen in any state. */
      #crash-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 8, 0.94);
        color: #f2f6ff;
        font-family: "Rajdhani", "Atkinson Hyperlegible", Arial, sans-serif;
        text-align: center;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      #crash-overlay.crash-overlay-visible {
        display: flex;
      }
      #crash-overlay .crash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 24px;
      }
      #crash-overlay .crash-title {
        font-weight: 700;
        font-size: clamp(18px, 3.6vw, 28px);
        letter-spacing: 4px;
        color: #ff5566;
      }
      #crash-overlay .crash-rule {
        width: 120px;
        height: 2px;
        background: #ff5566;
        opacity: 0.6;
      }
      #crash-overlay .crash-sub {
        font-family: "Atkinson Hyperlegible", Arial, sans-serif;
        font-size: 13px;
        color: #a0a8b8;
        max-width: 320px;
      }
      #crash-overlay .crash-action {
        margin-top: 6px;
        font-family: "Rajdhani", "Atkinson Hyperlegible", Arial, sans-serif;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 2px;
        color: #66bbff;
        border: 1.5px solid #66bbff;
        border-radius: 6px;
        padding: 8px 20px;
      }
      /* Secondary action: copy diagnostics for a bug report. Muted so the
         reload path stays the visually primary one. */
      #crash-overlay .crash-copy {
        margin-top: 2px;
        font-family: "Rajdhani", "Atkinson Hyperlegible", Arial, sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 2px;
        color: #a0a8b8;
        background: none;
        border: 1.5px solid #4a5468;
        border-radius: 6px;
        padding: 8px 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="boot-loader">
      <div class="boot-wordmark">PEW PEW SURVIVOR</div>
      <div class="boot-track"></div>
    </div>
    <div id="crash-overlay">
      <div class="crash-inner">
        <div class="crash-title">SOMETHING WENT WRONG</div>
        <div class="crash-rule"></div>
        <div class="crash-sub">The game hit an unexpected error and needs to reload. Your last save is safe.</div>
        <div class="crash-action">TAP TO RELOAD</div>
        <button id="crash-copy" class="crash-copy" type="button">COPY ERROR LOGS</button>
      </div>
    </div>
    <script>
      // iOS Safari ignores user-scalable=no for pinch and double-tap zoom;
      // gesture events are the reliable way to keep the game view locked.
      for (const type of ['gesturestart', 'gesturechange', 'gestureend']) {
        document.addEventListener(type, (e) => e.preventDefault());
      }
      document.addEventListener('dblclick', (e) => e.preventDefault());
    </script>
    <!-- IBXM tracker music player library -->
    <script src="lib/IBXM.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
