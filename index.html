<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Survivor Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background-color: #0a0a0f;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #game-container {
        width: 100%;
        height: 100%;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      /* Landscape orientation prompt for phones in portrait */
      #rotate-prompt {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0a0a0f;
        color: #888888;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        font-size: 18px;
        text-align: center;
        gap: 12px;
      }
      #rotate-prompt .rotate-icon {
        font-size: 48px;
      }
      @media (orientation: portrait) and (max-width: 767px) {
        #rotate-prompt { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="rotate-prompt">
      <div class="rotate-icon">&#x21BB;</div>
      <div>Please rotate your device to landscape</div>
    </div>
    <div id="game-container"></div>
    <!-- IBXM tracker music player library -->
    <script src="lib/IBXM.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
